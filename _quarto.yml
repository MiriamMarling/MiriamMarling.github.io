project:
  type: website
  output-dir: _site   # built HTML goes here — not committed to main
  resources:
    - data/daily_occupancy.csv   # not FileAttachment-referenced, must be listed explicitly

website:
  title: "BonQuery"
  description: "BonQuery uses publicly available data to investigate urgent humanitarian issues, starting with Toronto's shelter system capacity, demand, and flow analysis."
  site-url: https://bonquery.ca
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Projects
        menu:
          - href: projects/toronto-shelter.qmd
            text: "Inside Toronto's Shelter System"
          - href: projects/about-the-data.qmd
            text: "About the Data"
          - href: projects/data-validation.qmd
            text: "Data Validation"
          - text: "---"
          - href: projects/historical-trends.qmd
            text: "Historical Trends"
          - href: projects/monthly-snapshot.qmd
            text: "Monthly Snapshot"
          - href: projects/ytd-comparison.qmd
            text: "YTD Comparison"
      - href: about.qmd
        text: About
  page-footer:
    left: "© 2026 Miriam Marling · BonQuery"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo   # clean, readable — can be swapped in Stage 3
    css: styles.css
    toc: true
    toc-location: right   # sidebar TOC on project pages and about-the-data
