format:
  html:
    lang: en-CA
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-location: right
    include-after-body:
      text: |
        <script>
        // Inject a mobile-visible language toggle next to the theme toggle.
        // The navbar lang link (#bq-lang-toggle-nav) is hidden on mobile via CSS;
        // this clone stays pinned in the header row at all viewport widths.
        (function() {
          var darkTog = document.querySelector(".quarto-color-scheme-toggle");
          if (!darkTog) return;
          var langLink = document.getElementById("bq-lang-toggle-nav");
          var clone = document.createElement("a");
          clone.className = "bq-lang-mobile";
          clone.href   = langLink ? langLink.href : "/fr/";
          clone.textContent = langLink ? langLink.textContent : "FR";
          darkTog.parentNode.insertBefore(clone, darkTog.nextSibling);
        })();

        // Label the theme toggle with "Light" / "Dark"
        (function() {
          const tog = document.querySelector(".quarto-color-scheme-toggle");
          if (!tog) return;
          const label = document.createElement("span");
          label.className = "bq-theme-label";
          const update = () => {
            const isDark = document.documentElement.getAttribute("data-bs-theme") === "dark";
            label.textContent = isDark ? "Light" : "Dark";
          };
          tog.appendChild(label);
          update();
          new MutationObserver(update).observe(
            document.documentElement, {attributes: true, attributeFilter: ["data-bs-theme"]}
          );
        })();

        // Bilingual alert toggle (EN | FR) — sets data-lang on each .bq-bilingual
        // block; CSS in styles.css controls which language string is shown.
        document.querySelectorAll(".bq-bilingual").forEach(function (block) {
          var btns = block.querySelectorAll(".bq-lang-btn");
          function setLang(lang) {
            block.setAttribute("data-lang", lang);
            btns.forEach(function (b) {
              b.classList.toggle("active", b.dataset.set === lang);
            });
          }
          btns.forEach(function (b) {
            b.addEventListener("click", function () { setLang(b.dataset.set); });
          });
          setLang(block.getAttribute("data-lang") || "en");
        });

        // Language toggle + hreflang injection.
        // Runs on both EN and FR renders. Computes the mirror URL from the
        // current pathname and updates the static navbar toggle link so it
        // points at the exact FR/EN counterpart of this page.  Also injects
        // hreflang <link> tags so search engines understand the relationship.
        (function () {
          var root  = "/";
          var frPfx = "/fr/";
          var path  = location.pathname;
          var isFR  = path.startsWith(frPfx) ||
                      path === "/fr" || path === "/fr/";

          // Compute the mirror path
          var enPath, frPath;
          if (isFR) {
            enPath = path === "/fr" || path === "/fr/"
              ? "/"
              : path.replace(frPfx, "/");
            frPath = path.endsWith("/") ? path : path + "/";
          } else {
            enPath = path;
            frPath = frPfx + path.replace(/^\//, "");
          }
          // Normalise index: /path/ → /path/index.html only if already .html
          function abs(p) {
            return location.origin + p;
          }

          // Update the navbar toggle link (#bq-lang-toggle-nav)
          var tog = document.getElementById("bq-lang-toggle-nav") ||
                    document.querySelector("a[href='/fr/'],a[href='/']");
          if (tog) {
            tog.href = isFR ? enPath : frPath;
            tog.textContent = isFR ? "EN" : "FR";
          }

          // Inject hreflang tags
          function addLink(rel, hreflang, href) {
            var el = document.createElement("link");
            el.rel = rel;
            if (hreflang) el.setAttribute("hreflang", hreflang);
            el.href = href;
            document.head.appendChild(el);
          }
          addLink("alternate", "en-CA",    abs(enPath));
          addLink("alternate", "fr-CA",    abs(frPath));
          addLink("alternate", "x-default", abs(enPath));
        })();
        </script>
