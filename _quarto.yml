project:
  type: website
  output-dir: _site   # built HTML goes here — not committed to main
  render:
    - index.qmd
    - about.qmd
    - projects/about-the-data.qmd
    - projects/central-intake.qmd
    - projects/cold-response.qmd
    - projects/daily-occupancy.qmd
    - projects/data-validation.qmd
    - projects/data-validation-central-intake.qmd
    - projects/discrepancy-tracker.qmd
    - projects/historical-trends.qmd
    - projects/monthly-snapshot.qmd
    - projects/spike-detection.qmd
    - projects/toronto-shelter.qmd
    - projects/ytd-comparison.qmd
  resources:
    - data/daily_occupancy.csv                    # not FileAttachment-referenced
    - data/season_rug.csv                         # cold-response: temperature rug
    - data/cold_response_binned_by_winter_sc.csv  # cold-response: observed means

website:
  title: "BonQuery"
  description: "BonQuery uses publicly available data to investigate urgent humanitarian issues, starting with Toronto's shelter system capacity, demand, and flow analysis."
  site-url: https://bonquery.ca
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: projects/cold-response.qmd
        text: "Left in the Cold"
      - text: Audits
        menu:
          - text: "INDEPENDENT OVERSIGHT"
          - href: projects/discrepancy-tracker.qmd
            text: "Discrepancy Tracker"
          - href: projects/data-validation.qmd
            text: "Emergency Occupancy Audit"
          - href: projects/data-validation-central-intake.qmd
            text: "Central Intake Audit"
          - href: projects/about-the-data.qmd
            text: "Audit Methodology"
      - text: Shelter Dashboards
        menu:
          - href: projects/toronto-shelter.qmd
            text: "Inside Toronto's Shelter System"
          - href: projects/monthly-snapshot.qmd
            text: "Monthly System Flow Replication"
          - href: projects/ytd-comparison.qmd
            text: "Year-to-Date Capacity Match"
          - href: projects/historical-trends.qmd
            text: "Historical Trend Lines"
          - href: projects/central-intake.qmd
            text: "Referral Requests Analysis"
          - href: projects/spike-detection.qmd
            text: "Occupancy Spike Detection"
          - href: projects/daily-occupancy.qmd
            text: "Daily Occupancy & Capacity"
      - href: about.qmd
        text: About
    right:
      - text: "FR"
        href: /fr/
        id: bq-lang-toggle-nav
  page-footer:
    center: |
      An independent data audit for Toronto residents. / Un audit de données indépendant pour les résidents de Toronto.
      <br>
      <span style="font-size: 0.85em; opacity: 0.7;">© 2026 Miriam Marling · BonQuery</span>

format:
  html:
    lang: en-CA
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-location: right
    include-after-body: _includes/site-init.html
