# Refresh daily occupancy data from the City of Toronto's CKAN open data
# portal and republish the Quarto site.
#
# Runs at 10:07, 12:23, 14:37, and 16:43 UTC every day. The City typically
# publishes the previous day's shelter occupancy figures overnight. The first
# trigger gives a buffer; subsequent triggers are fallbacks for late CKAN
# publishes. Fire-once detection (sentinel files in data/) means multiple runs
# are safe — only the first run that sees new data will commit and publish.
#
# This workflow rebuilds the entire site, so it must generate ALL data files —
# both shelter_flow.json (from OCI) and daily_occupancy.json (from CKAN).
# The OCI pull is fast (~2s) and the data changes only monthly, but skipping
# it would leave shelter_flow.json missing and break the monthly flow pages.
#
# Author: Miriam Marling <miriam@BonQuery.ca>
# Date: 2026

name: Refresh daily occupancy and publish

on:
  schedule:
    - cron: '7 10 * * *'   # 10:07 UTC (6:07 AM EDT / 5:07 AM EST) — primary, ~2 hrs after CKAN data drop
    - cron: '23 12 * * *'  # 12:23 UTC (8:23 AM EDT / 7:23 AM EST) — fallback if first run misses
    - cron: '37 14 * * *'  # 14:37 UTC (10:37 AM EDT / 9:37 AM EST) — late-publish fallback
    - cron: '43 16 * * *'  # 16:43 UTC (12:43 PM EDT / 11:43 AM EST) — very-late-publish fallback
  workflow_dispatch:       # Allow manual triggering from the Actions tab
  push:
    branches: [main]       # Every push to main rebuilds and republishes

permissions:
  contents: write          # Needed to push to gh-pages

jobs:
  # Lightweight guard job — runs on every trigger, including scheduled fallbacks
  # that fire after the day's data has already been pulled and published.
  #
  # Responsibilities:
  #   1. OCI keepalive ping (load-bearing — must run on every fire even when the
  #      heavy job is skipped; see comment below).
  #   2. CKAN freshness check — reads CKAN metadata_modified and compares it to
  #      the committed sentinel (data/last_ckan_modified.txt). If the dataset has
  #      not advanced since the last successful run, outputs should_run=false and
  #      the refresh-occupancy job is skipped, saving the full pip install + three
  #      data pulls + Quarto render + publish on redundant fallback fires.
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.freshness.outputs.should_run }}
      metadata_modified: ${{ steps.freshness.outputs.metadata_modified }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install OCI driver (keepalive dependency)
        run: python -m pip install --upgrade pip && pip install oracledb

      # OCI Always Free keepalive — see scripts/keepalive_oci.py. The Autonomous
      # DB that backs the APEX dashboard is auto-stopped after 7 days idle, so a
      # daily connection is load-bearing. This step lives in the guard so it fires
      # on all four daily triggers, even when the heavy refresh job is skipped
      # because no new CKAN data has landed. Do not move or remove.
      - name: Keepalive ping — OCI Always Free (idle-reclamation guard)
        continue-on-error: true
        env:
          OCI_DSN: ${{ secrets.OCI_DSN }}
          OCI_DB_USER: ${{ secrets.OCI_DB_USER }}
          OCI_DB_PASS: ${{ secrets.OCI_DB_PASS }}
        run: python scripts/keepalive_oci.py

      # Compare the current CKAN metadata_modified timestamp to the committed
      # sentinel (data/last_ckan_modified.txt). If the dataset hasn't advanced,
      # should_run=false and the refresh-occupancy job will be skipped.
      # Fail-open: any exception (network error, parse failure, missing sentinel)
      # produces should_run=true so the heavy job always runs when uncertain.
      - name: Check CKAN freshness
        id: freshness
        run: |
          stored="$(cat data/last_ckan_modified.txt 2>/dev/null || true)"
          python scripts/check_ckan_freshness.py \
            daily-shelter-overnight-service-occupancy-capacity \
            "$stored"

  refresh-occupancy:
    runs-on: ubuntu-latest
    needs: guard
    # Skip on scheduled triggers when the CKAN dataset hasn't advanced since the
    # last successful run. Always run on push (site rebuild) and workflow_dispatch
    # (manual override) regardless of what the freshness check found.
    if: needs.guard.outputs.should_run == 'true' || github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oracledb requests beautifulsoup4

      # shelter_flow.json — monthly shelter flow data from OCI.
      # Required by monthly-snapshot.qmd, ytd-comparison.qmd, historical-trends.qmd.
      # Data changes only monthly but must be regenerated on every site build
      # because data/ is gitignored.
      - name: Generate shelter flow data (OCI)
        env:
          OCI_DSN: ${{ secrets.OCI_DSN }}
          OCI_DB_USER: ${{ secrets.OCI_DB_USER }}
          OCI_DB_PASS: ${{ secrets.OCI_DB_PASS }}
        run: python scripts/generate_data.py

      # daily_occupancy.json — daily shelter occupancy from CKAN (no secrets needed).
      # Side effect: also writes data/snapshots/raw_<UTC-timestamp>.json.gz containing
      # the full raw CKAN rows (pre-aggregation). Used by the data-drift investigation.
      # Must run BEFORE generate_central_intake.py, which reads daily_occupancy.json
      # to compute monthly occupancy buckets.
      - name: Pull daily occupancy data from CKAN
        run: python scripts/generate_daily_occupancy.py

      # central_intake.json — Central Intake call wrap-up codes and service queue data
      # from CKAN (no secrets needed). Required by central-intake.qmd.
      # Data changes only monthly but must be regenerated on every site build
      # because data/ is gitignored.
      - name: Pull Central Intake data from CKAN
        run: python scripts/generate_central_intake.py

      # ---- CKAN data-drift tracking ----
      # Downloads the most-recent prior raw snapshot (from the latest previous workflow
      # run that uploaded one), runs the diff against today's snapshot, and uploads both
      # the new snapshot and the diff report as artifacts.
      #
      # GitHub artifact retention defaults to 90 days. To keep snapshots longer, raise
      # the repo setting at: Settings → Actions → General → "Artifact and log retention".
      # For indefinite retention, archive snapshots to an external store.
      - name: Download previous CKAN raw snapshot (for drift diff)
        id: prev_snapshot
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ckan-raw-snapshot
          path: data/snapshots
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Diff CKAN snapshots (previous vs current)
        if: steps.prev_snapshot.outputs.found_artifact == 'true'
        run: python scripts/diff_ckan_snapshots.py
        continue-on-error: true

      - name: Upload CKAN raw snapshot (latest)
        uses: actions/upload-artifact@v4
        with:
          name: ckan-raw-snapshot
          path: data/snapshots/raw_*.json.gz
          overwrite: true

      - name: Upload CKAN drift report
        if: steps.prev_snapshot.outputs.found_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ckan-drift-report-${{ github.run_id }}
          path: data/ckan_drift_report.json
          if-no-files-found: warn

      # Read the drift report and decide whether a retroactive revision was detected.
      # Forward-only additions (new days being published) are NOT a revision; the
      # email below only fires when actual rows in historical dates were changed
      # or removed.
      - name: Detect retroactive revision in drift report
        if: steps.prev_snapshot.outputs.found_artifact == 'true'
        id: drift_check
        run: |
          python3 -c "
          import json, os
          from pathlib import Path

          report_path = Path('data/ckan_drift_report.json')
          if not report_path.exists():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_revision=false\n')
              print('No drift report present; skipping revision notification.')
              raise SystemExit(0)

          report  = json.loads(report_path.read_text())
          summary = report['summary']
          by_date = report['by_date']

          revised_dates = sorted(
              d for d, info in by_date.items()
              if info.get('changed') or info.get('removed')
          )
          has_revision = bool(revised_dates)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has_revision={\"true\" if has_revision else \"false\"}\n')
              f.write(f'n_changed={summary[\"rows_changed\"]}\n')
              f.write(f'n_removed={summary[\"rows_removed\"]}\n')
              f.write(f'n_revised_dates={len(revised_dates)}\n')
              f.write(f'revised_dates={\", \".join(revised_dates) if revised_dates else \"(none)\"}\n')
              f.write(f'old_pulled_at={report[\"old_snapshot\"].get(\"pulled_at\", \"?\")}\n')
              f.write(f'new_pulled_at={report[\"new_snapshot\"].get(\"pulled_at\", \"?\")}\n')

          print(f'has_revision    : {has_revision}')
          print(f'rows changed    : {summary[\"rows_changed\"]}')
          print(f'rows removed    : {summary[\"rows_removed\"]}')
          print(f'dates revised   : {len(revised_dates)} ({revised_dates if revised_dates else \"(none)\"})')
          "

      - name: Email notification — CKAN retroactive revision detected
        if: steps.drift_check.outputs.has_revision == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[bonquery] CKAN retroactive revision detected — ${{ steps.drift_check.outputs.n_changed }} programs changed across ${{ steps.drift_check.outputs.n_revised_dates }} dates"
          to: miriam@bonquery.ca
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            A retroactive revision to CKAN's daily shelter occupancy data was
            detected on the latest pull. Historical dates that had already been
            published in a previous CKAN release have changed values in this pull.

            Triggered by: ${{ github.event_name }}
            Pulled at:    ${{ steps.drift_check.outputs.new_pulled_at }}
            Compared to:  ${{ steps.drift_check.outputs.old_pulled_at }}

            Dates with revisions: ${{ steps.drift_check.outputs.revised_dates }}

            Programs changed:     ${{ steps.drift_check.outputs.n_changed }}
            Programs removed:     ${{ steps.drift_check.outputs.n_removed }}

            Full drift report is attached to the workflow run as artifact
            `ckan-drift-report-${{ github.run_id }}`:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Convert daily occupancy JSON to CSV
        run: |
          python -c "
          import csv, json
          from pathlib import Path
          rows = json.loads(Path('data/daily_occupancy.json').read_text())
          fields = ['date', 'key', 'label', 'ind', 'occ', 'unocc', 'cap', 'cap_funding', 'rate', 'col_type', 'indent', 'is_total']
          with open('data/daily_occupancy.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=fields, extrasaction='ignore')
              w.writeheader()
              w.writerows(rows)
          print(f'Wrote {len(rows):,} rows to data/daily_occupancy.csv')
          "

      - name: Validate against City of Toronto shelter census page
        run: python scripts/validate_city_page.py

      # Audit the City's full table against our published figures.
      # Runs after both validate_city_page.py (which writes city_daily_table.json)
      # and generate_daily_occupancy.py (which writes daily_occupancy.json).
      # continue-on-error so a parse failure doesn't abort the site rebuild.
      - name: Audit City table vs our published data
        run: python scripts/audit_city_scrape.py
        continue-on-error: true

      - name: Capture audit summary for email
        run: |
          if [ -f data/city_audit_summary.md ]; then
            printf '%s\n' 'CITY_AUDIT_SUMMARY<<EOF' >> "$GITHUB_ENV"
            cat data/city_audit_summary.md >> "$GITHUB_ENV"
            printf '\nEOF\n' >> "$GITHUB_ENV"
          else
            echo 'CITY_AUDIT_SUMMARY=(audit summary not available)' >> "$GITHUB_ENV"
          fi

      - name: Check audit report for mismatches
        id: audit_check
        run: |
          python3 -c "
          import hashlib, json, os, sys
          from pathlib import Path

          report_path = Path('data/city_audit_report.json')
          if not report_path.exists():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_mismatches=false\nmismatch_count=0\ndate_range=\nany_pending=false\n')
                  f.write('audit_changed=false\naudit_signature=\n')
              print('No audit report found; skipping mismatch check.')
              sys.exit(0)

          r = json.loads(report_path.read_text())
          n           = r.get('total_mismatches', r.get('mismatch_count', 0))
          any_pending = r.get('any_pending', False)
          passed      = r.get('passed')

          # Build a human-readable date range from the per-date list
          dates_list = [d['date'] for d in r.get('dates', [])]
          if not dates_list:
              dates_list = [r.get('city_date') or '(unknown)']
          if len(dates_list) == 1:
              date_range = dates_list[0]
          else:
              date_range = f'{dates_list[0]}–{dates_list[-1]}'

          # Compute a content signature over the audit table that will be emailed.
          # Use the markdown summary file when available (mirrors what the email
          # body receives); fall back to a hash of the structured fields so the
          # sentinel always advances when the mismatch set changes.
          summary_path = Path('data/city_audit_summary.md')
          if n > 0 and summary_path.exists():
              sig_src = summary_path.read_bytes()
          else:
              sig_src = f'{date_range}|{n}'.encode()
          current_sig = hashlib.sha256(sig_src).hexdigest()

          # Compare against the committed sentinel to decide whether to email.
          sig_path = Path('data/last_audit_signature.txt')
          old_sig  = sig_path.read_text().strip() if sig_path.exists() else ''
          audit_changed = n > 0 and current_sig != old_sig

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has_mismatches={\"true\" if n > 0 else \"false\"}\n')
              f.write(f'mismatch_count={n}\n')
              f.write(f'date_range={date_range}\n')
              f.write(f'any_pending={\"true\" if any_pending else \"false\"}\n')
              f.write(f'audit_changed={\"true\" if audit_changed else \"false\"}\n')
              f.write(f'audit_signature={current_sig}\n')

          print(f'Audit: {n} mismatch(es) for {date_range} (passed={passed}, pending={any_pending})')
          print(f'  current_sig : {current_sig[:16]}…')
          print(f'  old_sig     : {old_sig[:16] + \"…\" if old_sig else \"(none)\"}')
          print(f'  audit_changed: {audit_changed}')
          "
        continue-on-error: true

      - name: Email notification — City audit mismatches found
        if: steps.audit_check.outputs.has_mismatches == 'true' && steps.audit_check.outputs.audit_changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[bonquery] City audit: ${{ steps.audit_check.outputs.mismatch_count }} mismatch(es) — ${{ steps.audit_check.outputs.date_range }}"
          to: miriam@bonquery.ca
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            The City of Toronto shelter census page reports figures that differ
            from our published daily_occupancy.json.

            Dates audited:    ${{ steps.audit_check.outputs.date_range }}
            Mismatches found: ${{ steps.audit_check.outputs.mismatch_count }}
            Pending dates:    ${{ steps.audit_check.outputs.any_pending }}

            ${{ env.CITY_AUDIT_SUMMARY }}

            Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Verify output
        run: |
          ls -lh data/shelter_flow.json data/daily_occupancy.json \
                 data/city_validation.json data/central_intake.json \
                 data/city_bridging_triage.json 2>/dev/null || true
          python -c "
          import json
          rows = json.load(open('data/daily_occupancy.json'))
          dates = sorted({r['date'] for r in rows}, reverse=True)
          print(f'daily_occupancy: {len(rows):,} rows, most recent {dates[0]}')
          print(f'shelter_flow: {len(json.load(open(\"data/shelter_flow.json\"))):,} rows')
          v = json.load(open('data/city_validation.json'))
          print(f'city_validation: city_date={v[\"city_date\"]}, passed={v[\"passed\"]}')
          ci = json.load(open('data/central_intake.json'))
          months = ci.get('monthly', [])
          print(f'central_intake: {len(months)} monthly rows')
          "

      - name: Detect new or revised daily data
        run: |
          python3 -c "
          import hashlib, json, os
          from pathlib import Path

          json_path = Path('data/daily_occupancy.json')
          rows = json.loads(json_path.read_text())
          new_date = max(r['date'] for r in rows)
          new_hash = hashlib.sha256(json_path.read_bytes()).hexdigest()

          date_sentinel = Path('data/last_pull_date.txt')
          hash_sentinel = Path('data/last_pull_hash.txt')
          old_date = date_sentinel.read_text().strip() if date_sentinel.exists() else '0000-00-00'
          old_hash = hash_sentinel.read_text().strip() if hash_sentinel.exists() else ''

          new_day      = new_date > old_date
          content_diff = new_hash != old_hash

          print(f'Previous date / hash : {old_date} / {old_hash[:12] or \"(none)\"}')
          print(f'Current  date / hash : {new_date} / {new_hash[:12]}')
          print(f'  new day arrived?     {new_day}')
          print(f'  content changed?     {content_diff}')

          if new_day or content_diff:
              date_sentinel.write_text(new_date + '\n')
              hash_sentinel.write_text(new_hash + '\n')
              reason = 'new-day' if new_day else 'content-revision'
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'NEW_DATA=true\nLATEST_DATE={new_date}\nREBUILD_REASON={reason}\n')
              print(f'Republish triggered: {reason}')
          else:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write('NEW_DATA=false\n')
              print('No change; skipping publish.')
          "

      - name: Detect new Bridging & Triage entries
        run: |
          if git diff --quiet HEAD -- data/city_bridging_triage.json 2>/dev/null; then
            echo "city_bridging_triage.json unchanged"
            echo "BT_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "city_bridging_triage.json has new entries"
            echo "BT_CHANGED=true" >> "$GITHUB_ENV"
            if [ "$NEW_DATA" != "true" ]; then
              LATEST=$(python3 -c "import json; rows=json.load(open('data/daily_occupancy.json')); print(max(r['date'] for r in rows))")
              echo "LATEST_DATE=$LATEST" >> "$GITHUB_ENV"
              echo "REBUILD_REASON=bridging-triage-update" >> "$GITHUB_ENV"
            fi
          fi

      # Write the audit signature sentinel to disk. Committed in all three commit
      # steps below so the audit email only fires when the mismatch table changes.
      # Written unconditionally so the sentinel advances even when the audit is
      # clean (mismatch → no-mismatch transition is also tracked).
      - name: Write audit signature sentinel
        if: steps.audit_check.outputs.audit_signature != ''
        run: |
          printf '%s\n' "${{ steps.audit_check.outputs.audit_signature }}" \
            > data/last_audit_signature.txt

      # Write the CKAN metadata_modified sentinel to disk. This is committed below
      # (in all three commit steps) so the guard job can skip the heavy job on the
      # next scheduled fire when the dataset hasn't advanced.
      - name: Write CKAN freshness sentinel
        run: |
          printf '%s\n' "${{ needs.guard.outputs.metadata_modified }}" \
            > data/last_ckan_modified.txt

      - name: Commit sentinels if new data or revision detected
        if: env.NEW_DATA == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_pull_date.txt data/last_pull_hash.txt data/last_ckan_modified.txt
          git add data/last_audit_signature.txt 2>/dev/null || true
          git add data/city_bridging_triage.json 2>/dev/null || true
          git add data/city_daily_table.json data/city_audit_report.json 2>/dev/null || true
          if [ "${{ env.REBUILD_REASON }}" = "new-day" ]; then
            git commit -m "data: daily occupancy updated through ${{ env.LATEST_DATE }} [skip ci]"
          else
            git commit -m "data: daily occupancy revised retroactively (latest date still ${{ env.LATEST_DATE }}) [skip ci]"
          fi
          git pull --rebase origin main  # sync if a concurrent run already pushed
          git push origin main

      - name: Commit Bridging & Triage data if changed independently
        if: env.BT_CHANGED == 'true' && env.NEW_DATA != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/city_bridging_triage.json data/last_ckan_modified.txt
          git add data/last_audit_signature.txt 2>/dev/null || true
          git commit -m "data: bridging & triage entries updated [skip ci]"
          git pull --rebase origin main
          git push origin main

      # Fallback: commit the CKAN freshness sentinel when the heavy job ran but
      # found no data change and no BT update. Without this, the guard would
      # re-trigger the heavy job on the next fallback fire of the same day (the
      # CKAN metadata_modified advanced at the day's data drop, but nothing in
      # our dataset changed). git diff --staged --quiet prevents an empty commit
      # when last_ckan_modified.txt was already at this value.
      - name: Commit CKAN freshness sentinel (no data change this run)
        if: success() && env.NEW_DATA != 'true' && env.BT_CHANGED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_ckan_modified.txt
          git add data/last_audit_signature.txt 2>/dev/null || true
          git diff --staged --quiet || (
            git commit -m "data: CKAN freshness sentinel updated [skip ci]" &&
            git pull --rebase origin main &&
            git push origin main
          )

      - name: Set up Quarto
        if: env.NEW_DATA == 'true' || env.BT_CHANGED == 'true' || github.event_name != 'schedule'
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render EN site
        if: env.NEW_DATA == 'true' || env.BT_CHANGED == 'true' || github.event_name != 'schedule'
        run: quarto render

      # Scoped to fr/ so this profile pass only touches FR-pathed output —
      # `quarto render --profile fr` (no path) merges both project.render
      # lists and re-renders every EN page too, overwriting it with the FR
      # profile's lang and navbar.
      - name: Render FR site
        if: env.NEW_DATA == 'true' || env.BT_CHANGED == 'true' || github.event_name != 'schedule'
        run: quarto render fr --profile fr

      - name: Publish to GitHub Pages
        if: env.NEW_DATA == 'true' || env.BT_CHANGED == 'true' || github.event_name != 'schedule'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Email notification — workflow failed
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[bonquery] Daily occupancy sync FAILED"
          to: miriam@bonquery.ca
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            The refresh-daily-occupancy workflow failed.

            Triggered by: ${{ github.event_name }}
            Run log:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Open the run log to see which step failed.

      - name: Email notification — new data published
        if: success() && (env.NEW_DATA == 'true' || env.BT_CHANGED == 'true')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[bonquery] New daily occupancy data: ${{ env.LATEST_DATE }}"
          to: miriam@bonquery.ca
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            New daily occupancy data was pulled from CKAN and published to bonquery.ca.

            Latest date in dataset: ${{ env.LATEST_DATE }}
            Trigger reason:         ${{ env.REBUILD_REASON }}
            Triggered by:           ${{ github.event_name }}

            Site:    https://bonquery.ca
            Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
